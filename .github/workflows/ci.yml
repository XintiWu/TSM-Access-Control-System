name: Go CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 第一階段：靜態代碼分析與排版檢查 (Code Quality Assurance - 10%)
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false

      - name: Run golangci-lint for access-api
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          args: --timeout=5m
          working-directory: ./access-api
          
      - name: Run golangci-lint for admin-api
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          args: --timeout=5m
          working-directory: ./admin-api

      - name: Run golangci-lint for report-api
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          args: --timeout=5m
          working-directory: ./report-api

      - name: Run golangci-lint for aggregation-worker
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          args: --timeout=5m
          working-directory: ./aggregation-worker

      - name: Run golangci-lint for cache-invalidation-worker
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          args: --timeout=5m
          working-directory: ./cache-invalidation-worker

  # 第二階段：單元測試與集成測試 (System Testing & Validation - 25%)
  test:
    name: Unit & E2E Integration Testing
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      # 1. 執行單元測試 (Unit Tests)
      - name: Run Unit Tests
        run: |
          cd pkg/middleware && go test -v -coverprofile=coverage.out ./...
          cd ../../access-api && go test -v -coverprofile=coverage.out ./...
          cd ../admin-api && go test -v -coverprofile=coverage.out ./...
          cd ../cache-invalidation-worker && go test -v -coverprofile=coverage.out ./...
          cd ../report-api && go test -v -coverprofile=coverage.out ./...
          cd ..
          sed -i 's|github.com/tsmc/platform-middleware/|pkg/middleware/|g' pkg/middleware/coverage.out
          sed -i 's|github.com/tsmc/access-api/|access-api/|g' access-api/coverage.out
          sed -i 's|github.com/tsmc/admin-api/|admin-api/|g' admin-api/coverage.out
          sed -i 's|github.com/tsmc/cache-invalidation-worker/|cache-invalidation-worker/|g' cache-invalidation-worker/coverage.out
          sed -i 's|github.com/tsmc/report-api/|report-api/|g' report-api/coverage.out

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_SKIP_JRE_PROVISIONING: true
        with:
          args: >
            -Dsonar.projectKey=XintiWu_TSM-Access-Control-System
            -Dsonar.organization=xintiwu
            -Dsonar.go.coverage.reportPaths=pkg/middleware/coverage.out,access-api/coverage.out,admin-api/coverage.out,cache-invalidation-worker/coverage.out,report-api/coverage.out
            -Dsonar.scanner.skipJreProvisioning=true
            -Dsonar.cpd.exclusions=**/*_test.go

      # 2. 啟動 Docker Compose 服務，供集成與 E2E 測試使用
      - name: Start Core Docker Compose Services
        run: |
          docker compose up -d redis kafka clickhouse
          echo "Waiting dynamically for core services to be healthy..."
          for i in {1..30}; do
            ch_status=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q clickhouse) 2>/dev/null || echo "unhealthy")
            kafka_status=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q kafka) 2>/dev/null || echo "unhealthy")
            redis_status=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q redis) 2>/dev/null || echo "unhealthy")
            echo "Attempt $i: ClickHouse=$ch_status, Kafka=$kafka_status, Redis=$redis_status"
            if [ "$ch_status" == "healthy" ] && [ "$kafka_status" == "healthy" ] && [ "$redis_status" == "healthy" ]; then
              echo "All core database and message queue services are fully healthy!"
              break
            fi
            sleep 5
          done

      # 3. 初始化數據與資料庫 Schema
      - name: Initialize Test Schemas & Seed Data
        run: |
          make init-kafka-topics
          make schema-ch
          make schema-ch-migrate
          make seed-ch
          make seed

      # 3.5 啟動微服務
      - name: Start Microservices
        run: |
          docker compose up -d access-api admin-api aggregation-worker cache-invalidation-worker report-api
          echo "Waiting for microservices to build, start and stabilize..."
          sleep 20
          docker compose ps

      # 4. 執行整合測試 (Integration Tests)
      - name: Run E2E Integration Tests
        env:
          CH_DSN: clickhouse://default:password123@127.0.0.1:9000/access_control
        run: |
          make test-e2e-pipeline

      # 5. 驗證整條事件流流水線 (Pipeline Validation)
      - name: Verify Event Pipeline
        run: |
          make verify-pipeline

      # 6. 驗證 SLA 效能指標 (Performance SLA Validation via k6)
      - name: Setup k6
        run: |
          curl -L -s -o k6.tar.gz https://github.com/grafana/k6/releases/download/v0.51.0/k6-v0.51.0-linux-amd64.tar.gz
          tar -xzf k6.tar.gz
          sudo mv k6-v0.51.0-linux-amd64/k6 /usr/local/bin/k6
          k6 version

      - name: Verify Performance SLA (k6 Load Test)
        run: |
          make test-performance-k6

      # 7. 清理 Docker 容器
      - name: Shutdown Docker Compose
        if: always()
        run: docker compose down -v
