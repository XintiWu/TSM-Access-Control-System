apiVersion: monitoring.googleapis.com/v1
kind: Rules
metadata:
  name: access-control-rules
  namespace: access-control
spec:
  groups:
  - name: access_api
    interval: 15s
    rules:
    - record: access_api_qps
      expr: sum(rate(access_api_swipe_total[1m]))
    - record: access_api_p99_latency_ms
      expr: histogram_quantile(0.99, sum(rate(access_api_swipe_duration_ms_bucket[5m])) by (le))
  - name: security_alerts
    interval: 15s
    rules:
    - alert: AntiPassbackSpike
      expr: report_passback_deny_1m_max >= 50
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Anti-passback spike: {{ $value }} denies in 1 minute (max per door)"
        description: "Investigate door tailgating or badge sharing. Grafana dashboard Access Analytics."
