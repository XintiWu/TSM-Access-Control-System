apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: access-api-pod-scraper
  namespace: access-control
spec:
  selector:
    matchLabels:
      app: access-api
  endpoints:
  - port: 8080
    path: /metrics
    interval: 15s
---
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: report-api-pod-scraper
  namespace: access-control
spec:
  selector:
    matchLabels:
      app: report-api
  endpoints:
  - port: 8082
    path: /metrics
    interval: 15s