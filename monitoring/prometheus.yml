global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-rules.yml

scrape_configs:
  - job_name: access-api
    metrics_path: /metrics
    static_configs:
      - targets: ['access-api:8080']
        labels:
          service: access-api
  - job_name: report-api
    metrics_path: /metrics
    static_configs:
      - targets: ['report-api:8082']
        labels:
          service: report-api
