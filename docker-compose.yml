services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: access_control
      MARIADB_USER: access
      MARIADB_PASSWORD: access
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 40s

  access-api:
    build:
      context: ./access-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: inout-events
      DB_DSN: access:access@tcp(mariadb:3306)/access_control?parseTime=true
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mariadb:
        condition: service_healthy

  aggregation-worker:
    build:
      context: ./aggregation-worker
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: inout-events
      KAFKA_GROUP: aggregation-workers
      DB_DSN: access:access@tcp(mariadb:3306)/access_control?parseTime=true
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password123
    depends_on:
      kafka:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      clickhouse:
        condition: service_healthy


  admin-api:
    build:
      context: ./admin-api
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      HTTP_ADDR: ":8081"
      DB_DSN: access:access@tcp(mariadb:3306)/access_control?parseTime=true
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: permission-events
    depends_on:
      kafka:
        condition: service_healthy
      mariadb:
        condition: service_healthy

  cache-invalidation-worker:
    build:
      context: ./cache-invalidation-worker
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: permission-events
      KAFKA_GROUP: cache-invalidation-workers
      REDIS_ADDR: redis:6379
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  report-api:
    build:
      context: ./report-api
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      HTTP_ADDR: ":8082"
      REDIS_ADDR: redis:6379
      DB_DSN: access:access@tcp(mariadb:3306)/access_control?parseTime=true
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password123
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: clickhouse
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password123
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mariadb_data:
  clickhouse_data:

